<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Styleza | Fashion Redefined</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="navbar">
  <div class="logo">Styleza</div>

  <div class="search-box">
    <input type="text" placeholder='Search "Earrings"'>
  </div>

  <div class="nav-icons">
     <i class="fa-regular fa-heart" width="30"></i>
    <i class="fa-regular fa-user" width="30"></i>
    <a href="cart.html">
  <i class="fa-solid fa-bag-shopping"></i>
  </a>
  </div>
</header>

<section class="top-categories">
    <a href="beauty.html" class="top-item">
    <img src="images/beauty.jpg">
    <p>Beauty</p>
 

  <a href="fashion.html" class="top-item">
  <img src="images/fashion.jpg">
  <p>Fashion</p>
</a>


<a href="home.html" class="top-item">
  <img src="images/home.jpg">
  <p>Home</p>
</a>

<a href="footwear.html" class="top-item">    
  <img src="images/footwear.jpg">
    <p>Footwear</p>
</a>

<a href="accessories.html" class="top-item">
  <img src="images/accessories.jpg">
    <p>Accessories</p>
</a>
</section>

<section class="products">
  <h2>Trending Products</h2>

  <div class="product-grid">

    <div class="card">
      <img src="images/tshirt.jpg" alt="Printed T-Shirt">
      <h4>Printed T-Shirt</h4>
      <p>₹799</p>
      <div class="btns">
        <button class="cart-btn">Add to Cart</button>
        <button class="buy-btn">Buy Now</button>
      </div>
    </div>

    <div class="card">
      <img src="images/dress.jpg" alt="Women Dress">
      <h4>Women Dress</h4>
      <p>₹1499</p>
      <div class="btns">
        <button class="cart-btn">Add to Cart</button>
        <button class="buy-btn">Buy Now</button>
      </div>
    </div>

    <div class="card">
      <img src="images/kidswear.jpg" alt="Kids Wear">
      <h4>Kids Wear</h4>
      <p>₹999</p>
        <div class="btns">
        <button class="cart-btn">Add to Cart</button>
        <button class="buy-btn">Buy Now</button>
      </div>
    </div>
    <div class="card">
      <img src="images/traditional.jpg" alt="Traditional Wear">
      <h4>Traditional Wear</h4>
      <p>₹1299</p>
        <div class="btns">
        <button class="cart-btn">Add to Cart</button>
        <button class="buy-btn">Buy Now</button>
      </div>
    </div>

  </div>
</section>

</body>
</html>
